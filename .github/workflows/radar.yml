# Dogfood: run the radar on a PR against recorded intent. Advisory only — posts a
# review COMMENT, never blocks. Runs AUTOMATICALLY on every PR (opened / updated);
# cost is controlled by scope-first retrieval (only in-scope constraints call the
# LLM) + a low-cost provider (DeepSeek) + advisory non-blocking, not by manual
# gating (FR-INT-6 / NFR-COST-1, revised 2026-06-21). Can also be re-run manually:
#   • comment "/radar" on the PR (ChatOps; commenter must have write access)
#   • Actions → Run workflow (workflow_dispatch) with a PR number
# Always checks the PR diff against MAIN's ADRs. Needs the AI_GATEWAY_API_KEY secret
# (Vercel AI Gateway → DeepSeek V4 Pro).
# Sticky progress (FR-INT-7): posts a "started" review immediately, then edits THAT
# SAME review in place with the verdict — or a failure note if the run dies early.
name: "Radar — conformance check"

run-name: "Does PR #${{ inputs.pr || github.event.issue.number || github.event.pull_request.number }} still match what we decided?"

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr:
        description: "PR number to check against recorded intent (the ADRs)"
        required: true
        type: number
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write # post the advisory review via the Reviews API

concurrency:
  group: radar-pr-${{ inputs.pr || github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  radar:
    name: radar check — advisory, never blocks
    # Auto on every PR (opened / updated); also re-runnable manually via the Actions
    # button or a "/radar" comment from a write-access user.
    if: >-
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        startsWith(github.event.comment.body, '/radar') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    steps:
      - name: Resolve the PR number from whichever event fired
        id: pr
        run: |
          case "${{ github.event_name }}" in
            workflow_dispatch) echo "num=${{ inputs.pr }}" >> "$GITHUB_OUTPUT" ;;
            issue_comment)     echo "num=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT" ;;
            pull_request)      echo "num=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT" ;;
          esac

      # Sticky progress (FR-INT-7): post a "started" review NOW — before the ~1-min
      # build — so the PR immediately shows the check is running. Capture its id; the
      # finalize step edits this same review in place. Inline gh api (not the CLI),
      # which isn't available until after checkout + install.
      - name: Post the 'started' review (sticky placeholder)
        id: start
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ steps.pr.outputs.num }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          BODY=$(printf '## 🛰️ Delivery Radar — Architecture Conformance\n\n⏳ **Check started** — reading the recorded intent (the ADRs) and checking PR #%s against it…\n\n_Edits itself in place with the verdict when the run finishes (~1-2 min). Advisory — never blocks your merge._\n\n[Live log →](%s)' "$PR" "$RUN_URL")
          RID=$(gh api "repos/${REPO}/pulls/${PR}/reviews" -f event=COMMENT -f body="$BODY" --jq .id)
          echo "review_id=$RID" >> "$GITHUB_OUTPUT"
          echo "posted started review #$RID"

      # Check out the PR's code — the radar engine + this workflow must run from the
      # SAME ref (the restructured src/cli/main.ts lives here, not yet on main). The
      # ADR baseline still comes from main (FR-INT-6), fetched separately below.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      # MAIN's ADRs are the recorded-intent baseline (FR-INT-6): a PR is judged
      # against intent already on main, not intent it adds to itself.
      - name: Fetch main's ADRs (baseline)
        run: |
          git fetch --no-tags origin main
          rm -rf .radar-baseline && mkdir -p .radar-baseline
          git archive FETCH_HEAD docs/adr | tar -x -C .radar-baseline

      # Run the CLI straight from TypeScript with tsx — no build step / no dist path
      # to maintain (the CLI is platform-agnostic; this is just the driving edge).
      - name: Fetch the PR diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr diff ${{ steps.pr.outputs.num }} --repo ${{ github.repository }} > pr.diff

      - name: Extract constraints (deterministic, free)
        run: pnpm exec tsx src/cli/main.ts extract --adr-dir .radar-baseline/docs/adr

      - name: "Radar check — does the diff still match the ADRs? (LLM, advisory)"
        env:
          # DeepSeek V4 Pro via Vercel AI Gateway (ADR-0007 pluggable model layer).
          # Provider/model are plain config; only the key is a secret.
          RADAR_PROVIDER: vercel
          RADAR_MODEL: deepseek/deepseek-v4-pro
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
        run: pnpm exec tsx src/cli/main.ts conformance --adr-dir .radar-baseline/docs/adr --diff pr.diff --save verdicts.json

      # Success: render the verdict with the CLI (pure — stdout only), then the
      # workflow edits the SAME 'started' review in place via gh api. All platform
      # I/O lives here, never in the CLI.
      - name: Update the sticky review with the verdict
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ steps.pr.outputs.num }}
          REPO: ${{ github.repository }}
          RID: ${{ steps.start.outputs.review_id }}
        run: |
          BODY=$(pnpm exec tsx src/cli/main.ts comment --adr-dir .radar-baseline/docs/adr --verdicts verdicts.json --all)
          gh api -X PUT "repos/${REPO}/pulls/${PR}/reviews/${RID}" -f body="$BODY"

      # Failure/cancel: resolve the same review so it never stays stuck at "running".
      # Inline gh api — the CLI may not have run if we failed at install/check.
      - name: On failure, resolve the sticky review
        if: (failure() || cancelled()) && steps.start.outputs.review_id != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ steps.pr.outputs.num }}
          REPO: ${{ github.repository }}
          RID: ${{ steps.start.outputs.review_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          BODY=$(printf '## 🛰️ Delivery Radar — Architecture Conformance\n\n🟠 **Check did not finish** — the run ended before producing a verdict. The recorded intent is unchanged, and nothing here blocks your merge.\n\n[See the run log →](%s) — fix the cause and re-trigger /radar to retry.' "$RUN_URL")
          gh api -X PUT "repos/${REPO}/pulls/${PR}/reviews/${RID}" -f body="$BODY"
