# Dogfood: run the radar on a PR against recorded intent. Advisory only — posts a
# review COMMENT, never blocks. Cost-gated: it runs only when YOU trigger it
# (FR-INT-6 / NFR-COST-1), one of three user-initiated ways:
#   • comment "/radar" on the PR (ChatOps; commenter must have write access)
#   • add the "radar" label to the PR
#   • Actions → Run workflow (workflow_dispatch) with a PR number
# Always checks the PR diff against MAIN's ADRs. Needs the ANTHROPIC_API_KEY secret.
# Sticky progress (FR-INT-7): posts a "started" review immediately, then edits THAT
# SAME review in place with the verdict — or a failure note if the run dies early.
name: "Radar — conformance check"

run-name: "Does PR #${{ inputs.pr || github.event.issue.number || github.event.pull_request.number }} still match what we decided?"

on:
  workflow_dispatch:
    inputs:
      pr:
        description: "PR number to check against recorded intent (the ADRs)"
        required: true
        type: number
  issue_comment:
    types: [created]
  pull_request:
    types: [labeled]

permissions:
  contents: read
  pull-requests: write # post the advisory review via the Reviews API

concurrency:
  group: radar-pr-${{ inputs.pr || github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  radar:
    name: radar check — advisory, never blocks
    # Only on an explicit, authorised trigger: the manual button, a "/radar" PR
    # comment from a write-access user, or the "radar" label being added.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        startsWith(github.event.comment.body, '/radar') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request' && github.event.label.name == 'radar')
    runs-on: ubuntu-latest
    steps:
      - name: Resolve the PR number from whichever event fired
        id: pr
        run: |
          case "${{ github.event_name }}" in
            workflow_dispatch) echo "num=${{ inputs.pr }}" >> "$GITHUB_OUTPUT" ;;
            issue_comment)     echo "num=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT" ;;
            pull_request)      echo "num=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT" ;;
          esac

      # Sticky progress (FR-INT-7): post a "started" review NOW — before the ~1-min
      # build — so the PR immediately shows the check is running. Capture its id; the
      # finalize step edits this same review in place. Inline gh api (not the CLI),
      # because dist/ isn't built yet at this point.
      - name: Post the 'started' review (sticky placeholder)
        id: start
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ steps.pr.outputs.num }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          BODY=$(printf '## 🛰️ Delivery Radar — Architecture Conformance\n\n⏳ **Check started** — reading the recorded intent (the ADRs) and checking PR #%s against it…\n\n_Edits itself in place with the verdict when the run finishes (~1-2 min). Advisory — never blocks your merge._\n\n[Live log →](%s)' "$PR" "$RUN_URL")
          RID=$(gh api "repos/${REPO}/pulls/${PR}/reviews" -f event=COMMENT -f body="$BODY" --jq .id)
          echo "review_id=$RID" >> "$GITHUB_OUTPUT"
          echo "posted started review #$RID"

      # Always use MAIN's ADRs + radar (the recorded baseline intent), regardless of trigger.
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build radar
        run: pnpm build

      - name: Fetch the PR diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr diff ${{ steps.pr.outputs.num }} --repo ${{ github.repository }} > pr.diff

      - name: Extract constraints (deterministic, free)
        run: node dist/cli.js extract --adr-dir docs/adr

      - name: "Radar check — does the diff still match the ADRs? (LLM, advisory)"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node dist/cli.js check --adr-dir docs/adr --diff pr.diff --save verdicts.json

      # Success: edit the SAME 'started' review in place with the full verdict.
      # Uses the built CLI (dist/ exists — we got past build + check).
      - name: Update the sticky review with the verdict
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          node dist/cli.js comment --adr-dir docs/adr --verdicts verdicts.json
          --repo ${{ github.repository }} --pr ${{ steps.pr.outputs.num }}
          --update ${{ steps.start.outputs.review_id }} --all

      # Failure/cancel: resolve the same review so it never stays stuck at "running".
      # Inline gh api — the CLI may not be built if we failed at install/build/check.
      - name: On failure, resolve the sticky review
        if: (failure() || cancelled()) && steps.start.outputs.review_id != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ steps.pr.outputs.num }}
          REPO: ${{ github.repository }}
          RID: ${{ steps.start.outputs.review_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          BODY=$(printf '## 🛰️ Delivery Radar — Architecture Conformance\n\n🟠 **Check did not finish** — the run ended before producing a verdict. The recorded intent is unchanged, and nothing here blocks your merge.\n\n[See the run log →](%s) — fix the cause and re-trigger /radar to retry.' "$RUN_URL")
          gh api -X PUT "repos/${REPO}/pulls/${PR}/reviews/${RID}" -f body="$BODY"
