# Labelled eval corpus — real Backstage intent (ADRs) + real/representative diffs.
# gold is HUMAN-labelled by reading the diff against the ADR. The harness never
# asks the model for the gold label. See docs/specs/2026-06-15-eval-corpus-design.zh.md
#
# Vertical slice (ADR-BS012). More ADRs (006 React.FC, 014 fetch, 007 MSW) follow
# once this runs.

- id: adr012-violated-pr28986
  diff: eval/cases/adr012-toformat-pr28986.diff
  target_constraint: ADR-BS012-C1
  gold: violated
  capability: conformance
  realness: real-merged-pr
  source: https://github.com/backstage/backstage/pull/28986
  rationale: >
    A merged, CI-green PR titled "Fix date parsing and formatting in
    convertTimeToLocalTimezone" that STILL returns a custom
    toFormat('yyyy-MM-dd hh:mm:ss ZZZZ') for a value shown in the UI — violates
    ADR012 (use locale presets). An ungrounded best-practice reviewer sees only
    "date formatting, looks fine".

- id: adr012-aligned-preset
  diff: eval/cases/adr012-compliant.diff
  target_constraint: ADR-BS012-C1
  gold: aligned
  capability: conformance
  realness: constructed-compliant-example
  rationale: >
    Renders a timestamp via DateTime.toLocaleString(DateTime.DATETIME_MED) —
    compliant with ADR012. Tests that grounding does not over-flag.

- id: out-of-scope-docs
  diff: eval/cases/out-of-scope-docs.diff
  target_constraint: null
  gold: out-of-scope
  capability: retrieval
  realness: representative
  rationale: >
    Docs-only change (*.md). No code constraint is in scope, so radar must not
    fire — a retrieval-precision check.

- id: adr006-react-fc-violated
  diff: eval/cases/adr006-react-fc.diff
  target_constraint: ADR-BS006-C1
  gold: violated
  capability: conformance
  realness: constructed-probe
  rationale: >
    Adds a component typed `const StatusLabel: React.FC<Props>` — violates ADR006
    (avoid React.FC). No real PR adds React.FC because lint blocks it, so this is a
    probe; the point is the soul case: a generic best-practice reviewer treats
    React.FC as perfectly fine, so only the grounded checker flags it.

- id: adr014-nodefetch-supersede
  diff: eval/cases/adr014-nodefetch.diff
  target_constraint: ADR-BS014-C1
  gold: violated
  capability: conformance
  realness: real-code
  source: packages/backend-defaults/src/entrypoints/urlReader/lib/GithubUrlReader.ts
  rationale: >
    Real Backstage code importing `node-fetch`. It complied with ADR013 (which
    mandated node-fetch) but ADR014 supersedes it with native fetch, so the import
    is now drift from current intent — a Supersede case.

- id: adr007-adhoc-mock-violated
  diff: eval/cases/adr007-adhoc-mock.diff
  target_constraint: ADR-BS007-C1
  gold: violated
  capability: conformance
  realness: constructed-representative
  rationale: >
    A test that stubs the network via `global.fetch = jest.fn()` — the ad-hoc
    mocking ADR007 prohibits (use MSW). Representative of the ~11 global.fetch
    mocks still in the repo.

- id: adr007-msw-aligned
  diff: eval/cases/adr007-msw-aligned.diff
  target_constraint: ADR-BS007-C1
  gold: aligned
  capability: conformance
  realness: real-code
  source: packages/integration/src/gitlab/GitLabIntegration.test.ts
  rationale: >
    Real Backstage test mocking HTTP with MSW (setupServer + rest handlers) —
    compliant with ADR007. Tests that grounding does not over-flag.
